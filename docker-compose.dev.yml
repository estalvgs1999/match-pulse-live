# Development override — use with: npm run docker:dev
# Replaces the production build with a hot-reload server.
# Inherits the mongo service from docker-compose.yml.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: matchpulse-live:dev
    volumes:
      - .:/app
      # Anonymous volumes prevent the host's node_modules and .next from
      # overwriting the container's (avoids macOS/Linux binary conflicts).
      - /app/node_modules
      - /app/.next
    environment:
      # In dev mode, Next.js reads NEXT_PUBLIC_* at runtime (no build step).
      NEXT_PUBLIC_PUSHER_KEY: ${PUSHER_KEY}
      NEXT_PUBLIC_PUSHER_CLUSTER: ${PUSHER_CLUSTER}
      # Required for file-watchers to work over Docker Desktop bind mounts on macOS.
      WATCHPACK_POLLING: "true"
