services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Baked into the client bundle at build time — changing these requires rebuild.
        NEXT_PUBLIC_PUSHER_KEY: ${PUSHER_KEY}
        NEXT_PUBLIC_PUSHER_CLUSTER: ${PUSHER_CLUSTER}
    image: matchpulse-live:latest
    ports:
      - "${APP_PORT:-4000}:3000"
    environment:
      MONGODB_URI: mongodb://mongo:27017/matchpulse
      MONGODB_DB: matchpulse
      PUSHER_APP_ID: ${PUSHER_APP_ID}
      PUSHER_KEY: ${PUSHER_KEY}
      PUSHER_SECRET: ${PUSHER_SECRET}
      PUSHER_CLUSTER: ${PUSHER_CLUSTER}
      CONTROL_PASSWORD: ${CONTROL_PASSWORD:-devpassword}
    depends_on:
      - mongo
    restart: unless-stopped

volumes:
  mongo_data:
